# Package Tracker Agent - tracks delivery via A2A protocol
# Uses returnImmediately + push notifications for real-time updates

- route:
    id: package-agent
    from:
      uri: a2a:classpath:agent-card.json
      parameters:
        validateAuth: false
        returnImmediately: true
        asyncTimeout: 60000
        allowLocalWebhookUrls: true
      steps:
        - delay:
             simple: ${random(1500, 4500)}
        - script:
            simple: "${a2a:emit('📦 Package picked up from warehouse')}"
        - delay:
             simple: ${random(1500, 4500)}
        - script:
            simple: "${a2a:emit('🚚 In transit — en route to distribution center')}"
        - delay:
             simple: ${random(1500, 4500)}
        - script:
            simple: "${a2a:emit('🏪 At local distribution center')}"
        - delay:
            simple: ${random(1500, 4500)}
        - script:
            simple: "${a2a:emit('🛵 Out for delivery')}"
        - delay:
            simple: "${random(1500, 4500)}"
        - script:
            simple: "${a2a:emit('✅ Delivered! Left at front door')}"
        - delay:
            simple: "${random(1500, 4500)}"
        - setBody:
            constant: "📦 Package delivered successfully! Left at front door."
