# Package Tracker Agent - tracks delivery via A2A protocol
# Uses returnImmediately + a2aSubTask progress for push notifications

- route:
    id: package-agent
    from:
      uri: a2a:classpath:agent-card.json
      parameters:
        validateAuth: false
        returnImmediately: true
        asyncTimeout: 60000
        allowLocalWebhookUrls: true
      steps:
        - a2aSubTask:
            emitBefore: "📦 Checking package manifest..."
            emitAfter: "📦 Package picked up from warehouse"
            emitOnError: "📦 Package pickup failed: ${exception.message}"
            steps:
              - delay:
                  simple: ${random(1500, 4500)}
        - a2aSubTask:
            emitBefore: "🚚 Loading package for transport..."
            emitAfter: "🚚 In transit — en route to distribution center"
            emitOnError: "🚚 Transit handoff failed: ${exception.message}"
            steps:
              - delay:
                  simple: ${random(1500, 4500)}
        - a2aSubTask:
            emitBefore: "🏪 Scanning at distribution center..."
            emitAfter: "🏪 At local distribution center"
            emitOnError: "🏪 Distribution scan failed: ${exception.message}"
            steps:
              - delay:
                  simple: ${random(1500, 4500)}
        - a2aSubTask:
            emitBefore: "🛵 Assigning final courier..."
            emitAfter: "🛵 Out for delivery"
            emitOnError: "🛵 Courier assignment failed: ${exception.message}"
            steps:
              - delay:
                  simple: ${random(1500, 4500)}
        - a2aSubTask:
            emitBefore: "✅ Confirming delivery..."
            emitAfter: "✅ Delivered! Left at front door"
            emitOnError: "✅ Delivery confirmation failed: ${exception.message}"
            steps:
              - delay:
                  simple: "${random(1500, 4500)}"
        - setBody:
            constant: "📦 Package delivered successfully! Left at front door."
