# Traffic Agent - A2A Morning Routine Demo
camel.server.port=8083
camel.server.enabled=true

# Keycloak OIDC
keycloak.oidc.url=http://localhost:8180/realms/a2a-morning-routine/.well-known/openid-configuration
camel.oauth.traffic.client-id=traffic-agent
camel.oauth.traffic.client-secret=traffic-agent-secret
camel.oauth.traffic.token-endpoint=http://localhost:8180/realms/a2a-morning-routine/protocol/openid-connect/token
