# camel-jbang: dependency=mvn:org.apache.camel:camel-a2a:4.21.0-SNAPSHOT
# camel-jbang: dependency=camel:undertow
#
# Email Digest Agent - scans inbox via A2A protocol
# Pure YAML agent using a2aSubTask for scoped SSE progress
# Uses Undertow for real-time SSE streaming

- route:
    id: email-agent
    from:
      uri: a2a:classpath:agent-card.json
      parameters:
        protocolBinding: jsonrpc
        httpServerComponent: undertow
        validateAuth: false
      steps:
        - a2aSubTask:
            emitBefore: "📧 Connecting to inbox..."
            emitAfter: "📬 Found 12 unread messages..."
            emitOnError: "📧 Inbox scan failed: ${exception.message}"
            steps:
              - delay:
                  simple: ${random(1500, 4500)}
        - a2aSubTask:
            emitBefore: "🔍 Prioritizing by sender and subject..."
            emitAfter: "⚡ 3 urgent, 5 normal, 4 low priority"
            emitOnError: "🔍 Email prioritization failed: ${exception.message}"
            steps:
              - delay:
                  simple: ${random(1500, 4500)}
              - log:
                  message: "Email priorities computed"
        - setBody:
            constant: |
              📧 Email Digest:
              ⚡ URGENT:
                1. 🔴 VP Engineering — Q3 planning meeting moved to 10am
                2. 🔴 Security Team — Critical patch deployment today
                3. 🔴 HR — Benefits enrollment deadline tomorrow

              📋 NORMAL:
                4. Project Atlas — Sprint review notes
                5. Design Team — New mockups ready for review
                6. DevOps — Kubernetes upgrade scheduled
                7. Marketing — Newsletter draft for approval
                8. Finance — Expense report reminder

              📭 LOW:
                9. Community — Open source meetup next week
                10. Newsletter — Tech digest weekly
                11. Alerts — 4 GitHub notifications
                12. Promo — Cloud credits expiring
