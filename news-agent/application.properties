# News Agent - A2A Morning Routine Demo
camel.server.port=8081
camel.server.enabled=true

# Keycloak OIDC
keycloak.oidc.url=http://localhost:8180/realms/a2a-morning-routine/.well-known/openid-configuration
camel.oauth.news.client-id=news-agent
camel.oauth.news.client-secret=news-agent-secret
camel.oauth.news.token-endpoint=http://localhost:8180/realms/a2a-morning-routine/protocol/openid-connect/token
