# Morning Routine Assistant - A2A orchestration agent
# Multicasts to weather, news, and fortune agents and aggregates responses
# historyLength caps how many prior messages are retained in multi-turn context

- route:
    id: morning-briefing
    from:
      uri: a2a:classpath:agent-card.json
      parameters:
        protocolBinding: jsonrpc
        httpServerComponent: undertow
        historyLength: 10
        validateAuth: false
      steps:
        - log:
            message: "Morning briefing requested"
        - multicast:
            parallelProcessing: true
            aggregationStrategy: "#class:MorningBriefingAggregator"
            steps:
              - to:
                  uri: direct:call-weather
              - to:
                  uri: direct:call-news
              - to:
                  uri: direct:call-fortune
        - log:
            message: "Morning briefing ready"

- route:
    id: call-weather
    from:
      uri: direct:call-weather
      steps:
        - removeHeaders:
            pattern: "*"
        - setBody:
            constant: "What is the weather like?"
        - to:
            uri: a2a:http://localhost:8080
            parameters:
              oauthProfile: assistant
        - log:
            message: "Weather agent replied: ${a2a:text}"

- route:
    id: call-news
    from:
      uri: direct:call-news
      steps:
        - removeHeaders:
            pattern: "*"
        - choice:
            when:
              - simple: "${random(0,2)} == 0"
                steps:
                  - setBody:
                      constant: "What is trending?"
            otherwise:
              steps:
                - setBody:
                    constant: "What are the latest headlines?"
        - to:
            uri: a2a:http://localhost:8081
            parameters:
              oauthProfile: assistant
              protocolBinding: jsonrpc
        - log:
            message: "News agent replied: ${a2a:text}"

- route:
    id: call-fortune
    from:
      uri: direct:call-fortune
      steps:
        - removeHeaders:
            pattern: "*"
        - setBody:
            constant: "Give me a fortune cookie"
        - to:
            uri: a2a:http://localhost:8082
            parameters:
              apiKey: LU6NiAYEsEvKsL-KsQvw-6w6x3pYyR37kvLtsyQRpm4
        - log:
            message: "Fortune agent replied: ${a2a:text}"
