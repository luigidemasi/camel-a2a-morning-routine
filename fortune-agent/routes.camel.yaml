# Fortune Cookie Agent - serves random fortune quotes via A2A protocol
# Uses an agent-card.json file so API key requirements are advertised to clients
# Secured with API key authentication (X-API-Key header)

- route:
    id: fortune-agent
    from:
      uri: a2a:classpath:agent-card.json
      parameters:
        validateAuth: true
        apiKey: "{{fortune.api-key}}"
        apiKeyHeader: X-API-Key
      steps:
        - log:
            message: "${a2a:card.name} received: ${body}"
        - setBody:
            simple: "${bean:fortuneService?method=getRandomFortune}"
        - log:
            message: "${a2a:card.name} response: ${body}"
