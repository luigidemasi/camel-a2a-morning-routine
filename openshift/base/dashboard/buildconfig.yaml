apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: dashboard
  labels:
    app: a2a-morning-routine
    component: dashboard
spec:
  source:
    type: Git
    git:
      uri: https://github.com/ldemasi/a2a-examples.git
      ref: main
    contextDir: camel-a2a-morning-routine
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: dockerfiles/dashboard.Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: dashboard:latest
  triggers:
    - type: ConfigChange
