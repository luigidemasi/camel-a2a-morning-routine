apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: a2a-morning-routine
    component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-morning-routine
      component: keycloak
  template:
    metadata:
      labels:
        app: a2a-morning-routine
        component: keycloak
        app.kubernetes.io/part-of: a2a-morning-routine
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: admin-username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: admin-password
          args:
            - start
            - --import-realm
            - --http-enabled=true
            - --hostname-strict=false
            - --proxy-headers=xforwarded
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
