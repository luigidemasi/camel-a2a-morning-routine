apiVersion: v1
kind: ConfigMap
metadata:
  name: assistant-config
  labels:
    app: a2a-morning-routine
    component: assistant
data:
  application.properties: |
    camel.server.port=8090
    camel.server.enabled=true

    # Keycloak OIDC (OpenShift internal DNS)
    keycloak.oidc.url=http://keycloak:8080/realms/a2a-morning-routine/.well-known/openid-configuration
    camel.oauth.assistant.client-id=assistant-agent
    camel.oauth.assistant.client-secret=assistant-agent-secret
    camel.oauth.assistant.token-endpoint=http://keycloak:8080/realms/a2a-morning-routine/protocol/openid-connect/token
    camel.oauth.assistant.base-uri=http://keycloak:8080/realms/a2a-morning-routine
    camel.oauth.assistant.expected-audience=account
    camel.oauth.assistant.allow-insecure-http=false
