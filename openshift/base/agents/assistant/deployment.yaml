apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant
  labels:
    app: a2a-morning-routine
    component: assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assistant
  template:
    metadata:
      labels:
        app: assistant
        app.kubernetes.io/part-of: a2a-morning-routine
    spec:
      initContainers:
        - name: wait-for-keycloak
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ['sh', '-c']
          args:
            - |
              until curl -f http://keycloak:8080/health/ready; do
                echo "Waiting for Keycloak..."
                sleep 5
              done
              echo "Keycloak is ready!"
        - name: wait-for-agents
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for consumer agents to be ready..."
              sleep 30
              for agent in weather-agent news-agent fortune-agent traffic-agent email-agent package-agent breakfast-agent; do
                until curl -f http://${agent}:8080/.well-known/agent-card.json; do
                  echo "Waiting for ${agent}..."
                  sleep 5
                done
                echo "${agent} is ready!"
              done
              echo "All consumer agents ready!"
      containers:
        - name: assistant
          image: image-registry.openshift-image-registry.svc:5000/a2a-morning-routine/assistant:latest
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: config
              mountPath: /app/application.properties
              subPath: application.properties
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: config
          configMap:
            name: assistant-config
