apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: assistant
  labels:
    app: a2a-morning-routine
    component: assistant
spec:
  source:
    type: Git
    git:
      uri: https://github.com/ldemasi/a2a-examples.git
      ref: main
    contextDir: camel-a2a-morning-routine
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: dockerfiles/camel-agent.Dockerfile
      buildArgs:
        - name: AGENT_NAME
          value: assistant
        - name: CAMEL_VERSION
          value: 4.21.0-SNAPSHOT
  output:
    to:
      kind: ImageStreamTag
      name: assistant:latest
  triggers:
    - type: ConfigChange
