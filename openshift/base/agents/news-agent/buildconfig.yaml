apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: news-agent
  labels:
    app: a2a-morning-routine
    component: news-agent
spec:
  source:
    type: Git
    git:
      uri: https://github.com/luigidemasi/camel-a2a-morning-routine.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: dockerfiles/camel-agent.Dockerfile
      buildArgs:
        - name: AGENT_NAME
          value: news-agent
        - name: CAMEL_VERSION
          value: 4.21.0-SNAPSHOT
  output:
    to:
      kind: ImageStreamTag
      name: news-agent:latest
  triggers:
    - type: ConfigChange
