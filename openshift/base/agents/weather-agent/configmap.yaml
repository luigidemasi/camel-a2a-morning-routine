apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-agent-config
  labels:
    app: a2a-morning-routine
    component: weather-agent
data:
  application.properties: |
    camel.server.port=8080
    camel.server.enabled=true

    # Keycloak OIDC (OpenShift internal DNS)
    keycloak.oidc.url=http://keycloak:8080/realms/a2a-morning-routine/.well-known/openid-configuration
    camel.oauth.weather.client-id=weather-agent
    camel.oauth.weather.client-secret=weather-agent-secret
    camel.oauth.weather.token-endpoint=http://keycloak:8080/realms/a2a-morning-routine/protocol/openid-connect/token
    camel.oauth.weather.base-uri=http://keycloak:8080/realms/a2a-morning-routine
    camel.oauth.weather.expected-audience=account
    camel.oauth.weather.allow-insecure-http=false
