# Weather Agent - A2A Morning Routine Demo
camel.server.port=8080
camel.server.enabled=true

# Keycloak OIDC
keycloak.oidc.url=http://localhost:8180/realms/a2a-morning-routine/.well-known/openid-configuration
camel.oauth.weather.client-id=weather-agent
camel.oauth.weather.client-secret=weather-agent-secret
camel.oauth.weather.token-endpoint=http://localhost:8180/realms/a2a-morning-routine/protocol/openid-connect/token
camel.oauth.weather.base-uri=http://localhost:8180/realms/a2a-morning-routine
camel.oauth.weather.expected-audience=account
camel.oauth.weather.allow-insecure-http=true
